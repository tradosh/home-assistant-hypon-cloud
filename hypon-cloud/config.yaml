name: "Hypon Cloud TR"
description: "Integrate Hypon Cloud with Home Assistant-TR"
url: "https://github.com/tradosh/home-assistant-hypon-cloud"
version: "1.3.5"
slug: "hypon_cloud_integration_tr"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
stdin: true
init: false
options:
  username: "change_me"
  password: "change_me"
  refresh_time: 300
  system_id: "change_me"
  inverter_sn: ""
  config_put_endpoint: "/inverter/config"
  config_put_method: "PUT"
  enable_mqtt_controls: false
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery_prefix: "homeassistant"
  mqtt_base_topic: "hypon_cloud"
  mqtt_apply_on_change: false
  mqtt_sync_from_hypon: true
  mqtt_sync_interval: 7200
schema:
  username: str
  password: password
  system_id: str
  refresh_time: int(60,3600)
  inverter_sn: str
  config_put_endpoint: str
  config_put_method: str
  enable_mqtt_controls: bool
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_username: str
  mqtt_password: password
  mqtt_discovery_prefix: str
  mqtt_base_topic: str
  mqtt_apply_on_change: bool
  mqtt_sync_from_hypon: bool
  mqtt_sync_interval: int(60,86400)